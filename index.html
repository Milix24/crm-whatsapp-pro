<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsControl LITE - Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">WhatsControl LITE 🚀</div>
            <p>Tu asistente de ventas inteligente</p>
        </header>

        <div class="progress-section">
            <div class="progress-label">Progreso de Ventas</div>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>

        <section class="form-section">
            <input type="text" id="clientName" placeholder="Nombre del cliente">
            <input type="text" id="clientPhone" placeholder="WhatsApp (Ej: 56912345678)">
            <select id="status">
                <option value="Nuevo">📩 Nuevo</option>
                <option value="Interesado">🔥 Interesado</option>
                <option value="Venta Cerrada">✅ Venta Cerrada</option>
            </select>
            <button id="mainBtn" onclick="addClient()">Añadir Cliente</button>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Mis Contactos</h2>
                <div class="list-actions">
                    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Buscar...">
                    <button onclick="exportToExcel()" class="btn-export" title="Descargar Excel">📊</button>
                </div>
            </div>
            <div id="clientList"></div>
        </section>

        <footer>
            <p>💡 Tip: Exporta tu lista a Excel para tener un respaldo.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
