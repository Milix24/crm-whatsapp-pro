<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM WhatsApp - Plantilla Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>CRM WhatsApp 🚀</h1>
            <p>Gestiona tus prospectos y cierra ventas rápido.</p>
        </header>

        <section class="form-section">
            <input type="text" id="clientName" placeholder="Nombre del cliente">
            <input type="number" id="clientPhone" placeholder="Ej: 56912345678">
            <select id="status">
                <option value="Nuevo">Nuevo 📩</option>
                <option value="Interesado">Interesado 🔥</option>
                <option value="Cerrado">Venta Cerrada ✅</option>
            </select>
            <button onclick="addClient()">Añadir a mi lista</button>
        </section>

        <section class="list-section">
            <h2>Mis Clientes</h2>
            <div id="clientList"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
