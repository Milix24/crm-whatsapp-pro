<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsControl LITE - Asistente de Ventas 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="certified-seal">
            <svg viewBox="0 0 100 100" class="seal-svg">
                <path id="sealPath" d="M 50, 50 m -40, 0 a 40,40 0 1,1 80,0 a 40,40 0 1,1 -80,0" fill="transparent"/>
                <text class="seal-text">
                    <textPath href="#sealPath">WHATSCONTROL • ORIGINAL SYSTEM •</textPath>
                </text>
            </svg>
            <div class="inner-check">✓</div>
        </div>

        <header>
            <div class="logo">WhatsControl LITE 🚀</div>
            <p>Tu asistente de ventas inteligente</p>
        </header>

        <section class="form-section">
            <input type="text" id="clientName" placeholder="Nombre completo del cliente">
            <input type="text" id="clientPhone" placeholder="WhatsApp (Ej: 56912345678)">
            <select id="status">
                <option value="📩 Nuevo">📩 Nuevo Prospecto</option>
                <option value="🔥 Interesado">🔥 Cliente Interesado</option>
                <option value="✅ Venta Cerrada">✅ Venta Cerrada</option>
            </select>
            <button id="mainBtn" onclick="addClient()">Añadir Cliente</button>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Mis Contactos</h2>
                <div class="search-container">
                    <input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 Buscar por nombre...">
                    <button onclick="exportToExcel()" class="excel-btn">📊</button>
                </div>
            </div>

            <div id="clientList"></div>

            <div class="tip-container">
                <p>💡 Tip: Exporta tu lista a Excel para tener un respaldo.</p>
            </div>
        </section>

        <footer>
            <p>Desarrollado por WhatsControl © 2026</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
